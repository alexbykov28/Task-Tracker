<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker v10.0</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --primary: #3b82f6;
            --secondary: #f3f4f6;
            --accent: #10b981;
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.08);
            --border: #e5e7eb;
        }

        [data-theme="dark"] {
            --bg: #111827;
            --text: #f9fafb;
            --primary: #60a5fa;
            --secondary: #1f2937;
            --accent: #34d399;
            --danger: #f87171;
            --danger-bg: rgba(248, 113, 113, 0.08);
            --border: #374151;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            transition: 0.3s;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px;}
        .header h1 { margin: 0; font-size: 24px; color: var(--primary); }
        
        .main-layout { display: flex; gap: 20px; align-items: flex-start; }
        
        .sidebar { width: 33.33%; background: var(--secondary); padding: 15px; border-radius: 12px; border: 1px solid var(--border); box-sizing: border-box; }
        
        .main-content { width: 66.66%; display: flex; flex-direction: column; gap: 25px;}

        .grid { display: flex; flex-wrap: wrap; gap: 15px; }
        
        .task-card { 
            width: calc(50% - 8px); background: var(--secondary); padding: 12px; border-radius: 12px; 
            border: 1px solid var(--border); box-sizing: border-box; display: flex; flex-direction: column; gap: 8px; transition: 0.3s;
        }

        .task-card.goal-reached { border-color: var(--accent); background: rgba(16, 185, 129, 0.08); box-shadow: 0 0 10px rgba(16, 185, 129, 0.1); }
        [data-theme="dark"] .task-card.goal-reached { background: rgba(52, 211, 153, 0.08); }

        .routine-group h4 { margin: 0 0 10px 0; display: flex; align-items: center; gap: 8px; font-size: 16px; border-bottom: 1px solid var(--border); padding-bottom: 5px;}
        
        .routine-item {
            display: flex; justify-content: space-between; align-items: center; padding: 12px;
            background: var(--bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; transition: 0.2s;
        }
        .routine-item.completed { opacity: 0.6; border-color: var(--accent); background: rgba(16, 185, 129, 0.05); }
        .routine-item.completed .routine-name { text-decoration: line-through; }
        .routine-item.overdue { border-color: var(--danger); background: var(--danger-bg); box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); }
        
        .routine-details { flex: 1; display: flex; flex-direction: column; gap: 4px; margin-left: 12px; }
        .routine-name { font-weight: bold; font-size: 15px; }
        .routine-stats { font-size: 11px; opacity: 0.8; display: flex; gap: 10px; flex-wrap: wrap;}
        .streak-pill { background: var(--secondary); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); }
        
        .day-selector { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
        .day-selector label { font-size: 11px; background: var(--bg); border: 1px solid var(--border); padding: 4px 6px; border-radius: 4px; cursor: pointer;}
        .day-selector input { display: none; }
        .day-selector input:checked + span { color: var(--primary); font-weight: bold; }

        @media (max-width: 800px) { 
            .main-layout { flex-direction: column; }
            .sidebar, .main-content { width: 100%; }
            .task-card { width: 100%; } 
        }

        .progress-container { background: #ddd; border-radius: 4px; height: 6px; margin: 4px 0; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; width: 0%; transition: 0.5s; }

        .recent-activity { display: flex; justify-content: space-between; font-size: 10px; opacity: 0.8; padding-top: 5px; border-top: 1px dashed var(--border); }

        .stats-panel { background: var(--bg); border: 1px solid var(--border); padding: 8px; border-radius: 6px; font-size: 11px; display: flex; flex-direction: column; gap: 4px; margin: 2px 0; }

        .btn { border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; background: var(--primary); color: white; transition: 0.2s;}
        .btn:hover { opacity: 0.9; }
        .btn-stop { background: var(--danger); }
        .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-text { background: transparent; border: none; color: var(--primary); cursor: pointer; font-size: 10px; padding: 0 4px; }
        .btn-text:hover { text-decoration: underline; }
        .btn-icon { background: transparent; border: none; cursor: pointer; font-size: 14px; padding: 0 4px; opacity: 0.6; }
        .btn-icon:hover { opacity: 1; }
        
        .input-mini { padding: 6px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        .input-block { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
        
        .section { padding-top: 15px; border-top: 1px solid var(--border); }
        .history-item { font-size: 12px; display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid var(--border); }
        .timer-display { font-family: monospace; color: var(--primary); font-weight: bold; }
        
        .todo-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .todo-item.completed span { text-decoration: line-through; opacity: 0.5; }
        .custom-checkbox { cursor: pointer; accent-color: var(--accent); width: 20px; height: 20px; flex-shrink: 0; }
        
        /* Collapsible formatting */
        details > summary { list-style: none; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; outline: none; }
        details > summary::-webkit-details-marker { display:none; }
        details > summary::after { content: "▼"; font-size: 12px; transition: 0.3s; }
        details[open] > summary::after { transform: rotate(180deg); }
        
        /* Utility styles for main section summaries to match old header sizes */
        .header-summary { font-size: 1.3em; border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        .sidebar-summary { font-size: 1.17em; margin-bottom: 15px; margin-top: 0; }
    </style>
</head>
<body>

<div class="header">
    <h1 id="header-title">Loading Date...</h1>
    <button class="btn btn-ghost" onclick="toggleTheme()">🌓 Mode</button>
</div>

<div class="main-layout">
    <div class="sidebar">
        <details open>
            <summary class="sidebar-summary">📝 Quick To-Do List</summary>
            <div style="display:flex; gap:5px; margin-bottom: 15px; margin-top: 5px;">
                <input type="text" id="todoInput" class="input-mini" style="flex:1;" placeholder="Add a quick task..." onkeypress="if(event.key === 'Enter') addTodo()">
                <button class="btn" onclick="addTodo()">Add</button>
            </div>
            <div id="todo-list"></div>
        </details>
    </div>

    <div class="main-content">
        
        <details open id="active-routines-section">
            <summary class="header-summary">📋 Today's Active Tasks</summary>
            <div id="active-routines-container"></div>
        </details>

        <details id="completed-routines-section" style="display: none; opacity: 0.8; margin-top: -10px;">
            <summary style="font-size: 1.17em; border-bottom: 1px solid var(--border); padding-bottom: 5px;">✅ Completed Today</summary>
            <div id="completed-routines-container" style="margin-top: 10px;"></div>
        </details>

        <details id="upcoming-routines-section" style="opacity: 0.8;">
            <summary style="font-size: 1.17em; border-bottom: 1px solid var(--border); padding-bottom: 5px;">⏭️ Upcoming Routine Tasks</summary>
            <div id="upcoming-routines-container" style="margin-top: 10px;"></div>
        </details>

        <details open class="section">
            <summary class="header-summary">⏱️ Quantitative Trackers</summary>
            <div id="chart-placeholder" style="margin-bottom: 15px;">Logging data...</div>
            <div class="grid" id="task-list"></div>
        </details>

        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            
            <details class="section" style="background: var(--secondary); padding: 15px; border-radius: 12px; border: 1px solid var(--border); flex: 1; min-width: 300px;">
                <summary style="font-size: 1.17em; margin-bottom: 10px; color: var(--text);">🗓️ Add Routine Task</summary>
                <div class="input-block" style="margin-top: 10px;">
                    <input type="text" id="routineNameInput" class="input-mini" placeholder="Task name (e.g. Read 10 pages)">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <select id="routineTimeInput" class="input-mini" style="flex: 1;">
                        <option value="morning">☀️ Morning (6 AM - 12 PM)</option>
                        <option value="afternoon">🌤️ Afternoon (12 PM - 6 PM)</option>
                        <option value="evening">🌆 Evening (6 PM - 9 PM)</option>
                        <option value="night">🌙 Night (9 PM - 12 AM)</option>
                    </select>
                    <select id="routineRepeatType" class="input-mini" style="flex: 1;" onchange="toggleRepeatUI()">
                        <option value="weekly">Repeat: Days of Week</option>
                        <option value="monthly">Repeat: Date of Month</option>
                    </select>
                </div>
                
                <div class="input-block" id="weekly-ui" style="margin-top: 10px;">
                    <div class="day-selector">
                        <label><input type="checkbox" class="day-cb" value="0"><span>Sun</span></label>
                        <label><input type="checkbox" class="day-cb" value="1" checked><span>Mon</span></label>
                        <label><input type="checkbox" class="day-cb" value="2" checked><span>Tue</span></label>
                        <label><input type="checkbox" class="day-cb" value="3" checked><span>Wed</span></label>
                        <label><input type="checkbox" class="day-cb" value="4" checked><span>Thu</span></label>
                        <label><input type="checkbox" class="day-cb" value="5" checked><span>Fri</span></label>
                        <label><input type="checkbox" class="day-cb" value="6"><span>Sat</span></label>
                    </div>
                </div>

                <div class="input-block" id="monthly-ui" style="display: none; margin-top: 10px;">
                    <input type="text" id="routineMonthDate" class="input-mini" placeholder="Enter dates e.g., 1, 15, 30">
                </div>
                <button class="btn" style="margin-top: 10px; width: 100%;" onclick="addRoutine()">+ Save Routine</button>
            </details>

            <details class="section" style="background: var(--secondary); padding: 15px; border-radius: 12px; border: 1px solid var(--border); flex: 1; min-width: 300px;">
                <summary style="font-size: 1.17em; margin-bottom: 10px; color: var(--text);">⏱️ Add Quantitative Tracker</summary>
                <div class="input-block" style="margin-top: 10px;">
                    <input type="text" id="taskNameInput" placeholder="Tracker Name..." class="input-mini">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <select id="taskTypeInput" class="input-mini" style="flex: 1;">
                        <option value="time">Time (m)</option>
                        <option value="seconds">Time (s)</option>
                        <option value="count">Counter</option>
                    </select>
                    <input type="number" id="taskGoalInput" placeholder="Daily Goal" class="input-mini" style="flex: 1;">
                </div>
                <button class="btn" style="margin-top: 10px; width: 100%;" onclick="addTask()">+ Add Tracker</button>
            </details>
        </div>

        <details class="section" style="background: var(--bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border);">
            <summary style="font-size: 1.17em; color: var(--text);">⚙️ History & Tools</summary>
            <div style="margin-top: 15px; margin-bottom: 15px;">
                <button class="btn btn-ghost" onclick="exportData()">📤 Export Data</button>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)">
                <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">📥 Import Data</button>
                <button class="btn btn-stop" onclick="clearAllData()">⚠️ Factory Reset</button>
            </div>
            <div id="history-list"></div>
        </details>

        <details class="section" style="margin-bottom: 20px;">
            <summary class="header-summary" style="border:none; padding-bottom:0; margin-bottom: 10px;">📝 Notes</summary>
            <textarea id="app-notes" style="width: 100%; height: 150px; border-radius: 8px; padding: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); resize: vertical; box-sizing: border-box;" placeholder="Write your notes here... (Auto-saves instantly)" oninput="saveNotes()"></textarea>
        </details>
    </div>
</div>

<div id="app-info" style="text-align: center; opacity: 0.5; font-size: 12px; margin-top: 40px; padding: 20px 0; border-top: 1px dashed var(--border);">
    <strong>Task Tracker v10.0</strong><br>
    <span style="display: inline-block; margin-top: 5px;">
        Lines of Active Code: <b id="loc-display">Loading...</b> | 
        Total Words: <b id="word-display">Loading...</b>
    </span>
</div>

<script>
    let tasks = [];
    let history = [];
    let todos = [];
    let routines = [];
    let activeTimers = {};

    const timeConfig = {
        morning: { label: 'Morning Tasks', emoji: '☀️', endHour: 12, order: 1 },
        afternoon: { label: 'Afternoon Tasks', emoji: '🌤️', endHour: 18, order: 2 },
        evening: { label: 'Evening Tasks', emoji: '🌆', endHour: 21, order: 3 },
        night: { label: 'Night Tasks', emoji: '🌙', endHour: 24, order: 4 }
    };

    const daysMap = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

    try {
        tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        history = JSON.parse(localStorage.getItem('history')) || [];
        todos = JSON.parse(localStorage.getItem('todos')) || [];
        routines = JSON.parse(localStorage.getItem('routines')) || [];
        document.getElementById('app-notes').value = localStorage.getItem('appNotes') || "";
    } catch (e) {
        console.error("Error loading data", e);
    }

    function saveNotes() {
        localStorage.setItem('appNotes', document.getElementById('app-notes').value);
    }

    // Dynamic App Info Calculator
    function calculateAppInfo() {
        try {
            const htmlStr = document.documentElement.outerHTML;
            const lines = htmlStr.split('\n').length + 2; // +2 buffer for doctype/html
            const words = htmlStr.split(/\s+/).filter(w => w.length > 0).length;
            
            document.getElementById('loc-display').innerText = lines.toLocaleString();
            document.getElementById('word-display').innerText = words.toLocaleString();
        } catch(e) {
            document.getElementById('loc-display').innerText = "~850";
            document.getElementById('word-display').innerText = "~4,500";
        }
    }

    // Header Date Formatting
    function setHeaderDate() {
        const d = new Date();
        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        
        const dayName = days[d.getDay()];
        const monthName = months[d.getMonth()];
        const dateNum = d.getDate();
        
        const getSuffix = function(n) {
            if (n > 3 && n < 21) return 'th';
            switch (n % 10) {
                case 1:  return "st";
                case 2:  return "nd";
                case 3:  return "rd";
                default: return "th";
            }
        };
        document.getElementById('header-title').innerText = `${dayName} - ${monthName} ${dateNum}${getSuffix(dateNum)}`;
    }

    function toggleTheme() {
        const doc = document.documentElement;
        doc.getAttribute('data-theme') === 'dark' ? doc.removeAttribute('data-theme') : doc.setAttribute('data-theme', 'dark');
    }

    function checkDailyReset() {
        const today = new Date().toLocaleDateString();
        let changed = false;
        tasks.forEach(t => {
            if (t.lastUpdated !== today) {
                t.current = 0; 
                t.lastUpdated = today;
                changed = true;
            }
        });
        return changed;
    }

    // --- ROUTINE LOGIC --- //

    function toggleRepeatUI() {
        const type = document.getElementById('routineRepeatType').value;
        document.getElementById('weekly-ui').style.display = type === 'weekly' ? 'block' : 'none';
        document.getElementById('monthly-ui').style.display = type === 'monthly' ? 'block' : 'none';
    }

    function addRoutine() {
        const name = document.getElementById('routineNameInput').value.trim();
        const timeOfDay = document.getElementById('routineTimeInput').value;
        const repeatType = document.getElementById('routineRepeatType').value;
        
        let repeatData = [];
        if (repeatType === 'weekly') {
            repeatData = Array.from(document.querySelectorAll('.day-cb:checked')).map(cb => cb.value);
            if(repeatData.length === 0) return alert("Select at least one day.");
        } else {
            const dateVal = document.getElementById('routineMonthDate').value;
            const parsedDates = dateVal.split(',').map(d => d.trim()).filter(d => !isNaN(d) && d >= 1 && d <= 31);
            if(parsedDates.length === 0) return alert("Please enter valid dates (1-31) separated by commas.");
            repeatData = parsedDates;
        }

        if(!name) return alert("Please enter a routine name.");

        routines.push({
            id: Date.now(),
            name,
            timeOfDay,
            repeatType, 
            repeatData, 
            history: [],
            bestStreak: 0
        });

        document.getElementById('routineNameInput').value = '';
        if(repeatType === 'monthly') document.getElementById('routineMonthDate').value = '';
        saveAndRender();
    }

    function deleteRoutine(id) {
        if(confirm("Delete this routine?")) {
            routines = routines.filter(r => r.id !== id);
            saveAndRender();
        }
    }

    function toggleRoutine(id) {
        const routine = routines.find(r => r.id === id);
        if(!routine) return;
        
        const todayStr = new Date().toLocaleDateString();
        const index = routine.history.indexOf(todayStr);
        
        if (index > -1) routine.history.splice(index, 1); 
        else routine.history.push(todayStr); 
        
        saveAndRender();
    }

    function editRoutineTime(id) {
        const routine = routines.find(r => r.id === id);
        if(!routine) return;
        const newTime = prompt(`Change time for ${routine.name}? \nOptions: morning, afternoon, evening, night`, routine.timeOfDay);
        if(newTime && timeConfig[newTime.toLowerCase()]) {
            routine.timeOfDay = newTime.toLowerCase();
            saveAndRender();
        }
    }

    function calculateRoutineStats(routine) {
        let streak = 0;
        let d = new Date();
        const todayStr = d.toLocaleDateString();
        const isCompletedToday = routine.history.includes(todayStr);

        const rType = routine.repeatType || 'weekly';
        const rData = routine.repeatData || routine.repeatDays || [];

        if (isCompletedToday) streak++;

        for(let i = 1; i <= 365; i++) {
            let pastDate = new Date();
            pastDate.setDate(pastDate.getDate() - i);
            
            let isScheduledDay = false;
            if (rType === 'monthly') {
                isScheduledDay = rData.includes(pastDate.getDate().toString());
            } else {
                isScheduledDay = rData.includes(pastDate.getDay().toString());
            }

            if (isScheduledDay) {
                if (routine.history.includes(pastDate.toLocaleDateString())) streak++;
                else break; 
            }
        }

        if (streak > (routine.bestStreak || 0)) routine.bestStreak = streak;

        let scheduleString = rType === 'monthly' ? `Dates: ${rData.join(', ')}` : rData.map(day => daysMap[day]).join(', ');

        return { streak, isCompletedToday, scheduleString };
    }

    function getNextDueString(routine) {
        const rType = routine.repeatType || 'weekly';
        const rData = routine.repeatData || routine.repeatDays || [];
        for(let i = 1; i <= 31; i++) {
            let d = new Date(); 
            d.setDate(d.getDate() + i);
            let checkStr = rType === 'monthly' ? d.getDate().toString() : d.getDay().toString();
            if (rData.includes(checkStr)) {
                if (i === 1) return "Tomorrow";
                return `${daysMap[d.getDay()]}, ${d.getMonth()+1}/${d.getDate()}`;
            }
        }
        return "Unknown";
    }

    function renderRoutines() {
        const containerActive = document.getElementById('active-routines-container');
        const containerCompleted = document.getElementById('completed-routines-container');
        const completedSection = document.getElementById('completed-routines-section');
        
        const containerUpcoming = document.getElementById('upcoming-routines-container');
        const upcomingSection = document.getElementById('upcoming-routines-section');
        
        const todayDate = new Date();
        const todayDayStr = todayDate.getDay().toString();
        const todayDateNum = todayDate.getDate().toString();
        const currentHour = todayDate.getHours();
        
        let groups = { morning: [], afternoon: [], evening: [], night: [] };
        let completedHTML = "";
        let upcomingHTML = "";
        
        let hasCompleted = false;
        let hasUpcoming = false;

        routines.forEach(r => {
            const stats = calculateRoutineStats(r);
            const rType = r.repeatType || 'weekly';
            const rData = r.repeatData || r.repeatDays || [];
            
            let isDueToday = rType === 'monthly' ? rData.includes(todayDateNum) : rData.includes(todayDayStr);
            
            const buildHTML = (isUpcomingView = false) => {
                const isOverdue = !isUpcomingView && !stats.isCompletedToday && currentHour >= timeConfig[r.timeOfDay].endHour;
                return `
                <div class="routine-item ${stats.isCompletedToday && !isUpcomingView ? 'completed' : ''} ${isOverdue ? 'overdue' : ''}">
                    ${!isUpcomingView ? `<input type="checkbox" class="custom-checkbox" ${stats.isCompletedToday ? 'checked' : ''} onchange="toggleRoutine(${r.id})">` : '<div style="width:20px; text-align:center;">🗓️</div>'}
                    <div class="routine-details">
                        <span class="routine-name">${r.name}</span>
                        <div class="routine-stats">
                            <span class="streak-pill">Current Streak: ${stats.streak}</span>
                            <span class="streak-pill">Best Streak: ${r.bestStreak}</span>
                            <span>⏱️ ${isUpcomingView ? `Due: ${getNextDueString(r)}` : stats.scheduleString}</span>
                            ${isOverdue ? '<span style="color:var(--danger); font-weight:bold;">OVERDUE</span>' : ''}
                        </div>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:4px;">
                        <button class="btn-text" onclick="editRoutineTime(${r.id})">Edit</button>
                        <button class="btn-text" style="color:var(--danger)" onclick="deleteRoutine(${r.id})">Del</button>
                    </div>
                </div>`;
            };

            if (isDueToday) {
                if (stats.isCompletedToday) {
                    completedHTML += buildHTML(false);
                    hasCompleted = true;
                } else {
                    groups[r.timeOfDay].push(buildHTML(false));
                }
            } else {
                upcomingHTML += buildHTML(true);
                hasUpcoming = true;
            }
        });

        let activeHTML = "";
        ['morning', 'afternoon', 'evening', 'night'].forEach(time => {
            if (groups[time].length > 0) {
                activeHTML += `
                    <div class="routine-group">
                        <h4>${timeConfig[time].emoji} ${timeConfig[time].label}</h4>
                        ${groups[time].join('')}
                    </div>
                `;
            }
        });

        containerActive.innerHTML = activeHTML || `<p style="opacity: 0.6; font-size: 14px;">All active tasks are completed for today! 🎉</p>`;
        
        containerCompleted.innerHTML = completedHTML;
        completedSection.style.display = hasCompleted ? 'block' : 'none';

        containerUpcoming.innerHTML = upcomingHTML;
        upcomingSection.style.display = hasUpcoming ? 'block' : 'none';
    }


    // --- TRACKERS & TODOS --- //

    function addTodo() {
        const input = document.getElementById('todoInput');
        if (!input.value.trim()) return;
        todos.push({ id: Date.now(), text: input.value.trim(), completed: false });
        input.value = '';
        saveAndRender();
    }
    
    function deleteTodo(id) { todos = todos.filter(t => t.id !== id); saveAndRender(); }
    
    function toggleTodo(id) { const todo = todos.find(t => t.id === id); if (todo) todo.completed = !todo.completed; saveAndRender(); }
    
    function renderTodos() {
        const container = document.getElementById('todo-list');
        const activeTodos = todos.filter(t => !t.completed);
        const completedTodos = todos.filter(t => t.completed);

        const generateItemHTML = (t) => `
            <div class="todo-item ${t.completed ? 'completed' : ''}">
                <label style="display: flex; gap: 10px; align-items: center; cursor: pointer; flex: 1;">
                    <input type="checkbox" class="custom-checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTodo(${t.id})">
                    <span>${t.text}</span>
                </label>
                <button class="btn-stop" style="background:none; border:none; cursor:pointer; color:var(--danger); padding: 0 5px;" onclick="deleteTodo(${t.id})">✕</button>
            </div>
        `;

        let html = activeTodos.map(generateItemHTML).join('');

        if (completedTodos.length > 0) {
            html += `
                <details style="margin-top: 15px; opacity: 0.7;">
                    <summary style="font-size: 13px; font-weight: normal; color: var(--primary);">✅ Completed Tasks (${completedTodos.length})</summary>
                    <div style="margin-top: 5px;">
                        ${completedTodos.map(generateItemHTML).join('')}
                    </div>
                </details>
            `;
        }

        container.innerHTML = html;
    }

    function addTask() {
        const name = document.getElementById('taskNameInput').value;
        const type = document.getElementById('taskTypeInput').value;
        const goal = document.getElementById('taskGoalInput').value;
        if(!name || !goal) return alert("Fill all fields");
        tasks.push({ 
            id: Date.now(), 
            name, 
            type, 
            goal: parseInt(goal), 
            current: 0, 
            lastUpdated: new Date().toLocaleDateString(),
            createdAt: new Date().toLocaleDateString()
        });
        document.getElementById('taskNameInput').value = '';
        saveAndRender();
    }

    function editName(id) { const task = tasks.find(t => t.id === id); if(task) { const newName = prompt(`Enter new name:`, task.name); if(newName && newName.trim() !== "") { task.name = newName.trim(); saveAndRender(); } } }
    function editGoal(id) { const task = tasks.find(t => t.id === id); if(task) { const newGoal = prompt(`Enter new goal:`, task.goal); if(newGoal && !isNaN(newGoal) && newGoal > 0) { task.goal = parseFloat(newGoal); saveAndRender(); } } }

    function updateProgress(id, value) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;
        const val = parseFloat(value);
        if(isNaN(val) || val <= 0) return;
        task.current += val;
        logHistory(task.id, task.name, val, task.type === 'time' ? 'mins' : (task.type === 'seconds' ? 'secs' : 'units'));
        saveAndRender();
    }

    function logHistory(taskId, name, val, unit) {
        history.unshift({ id: Date.now(), taskId, name, val, unit, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString() });
    }

    function deleteSession(histId) {
        const item = history.find(h => h.id === histId);
        if (item) {
            const task = tasks.find(t => t.id === item.taskId || t.name === item.name);
            const today = new Date().toLocaleDateString();
            if (task && item.date === today) task.current = Math.max(0, task.current - item.val);
            history = history.filter(h => h.id !== histId);
            saveAndRender();
        }
    }

    function getTaskStats(task) {
        const taskHistory = history.filter(h => h.taskId === task.id || h.name === task.name);
        let lifetime = 0, bestSession = 0, dailyTotals = {};
        let bestSessionDate = "N/A";
        
        taskHistory.forEach(h => {
            const val = parseFloat(h.val);
            lifetime += val;
            if (val > bestSession) {
                bestSession = val;
                bestSessionDate = h.date;
            }
            dailyTotals[h.date] = (dailyTotals[h.date] || 0) + val;
        });

        let bestDay = 0; 
        for (const date in dailyTotals) if (dailyTotals[date] > bestDay) bestDay = dailyTotals[date];

        let activeDays = Object.keys(dailyTotals).sort((a, b) => new Date(b) - new Date(a));
        let last7Days = activeDays.slice(0, 7);
        let sum7 = 0;
        last7Days.forEach(d => sum7 += dailyTotals[d]);
        let avg7Sessions = last7Days.length > 0 ? (sum7 / last7Days.length) : 0;
        let recGoal = avg7Sessions * 1.02;

        const todayStr = new Date().toLocaleDateString();
        const todayTotal = dailyTotals[todayStr] || 0;
        
        let trendText = "Stable";
        if (last7Days.length > 0) {
            if (todayTotal > avg7Sessions + 0.1) trendText = "Trending Up";
            else if (todayTotal < avg7Sessions - 0.1) trendText = "Trending Down";
        }
        
        return { lifetime, bestSession, bestSessionDate, bestDay, trendText, avg7Sessions, recGoal };
    }

    function getHistoryForDay(taskId, taskName, daysAgo) {
        const d = new Date(); d.setDate(d.getDate() - daysAgo);
        return history.filter(h => (h.taskId === taskId || h.name === taskName) && h.date === d.toLocaleDateString()).reduce((s, h) => s + parseFloat(h.val), 0);
    }

    function saveAndRender() {
        checkDailyReset();
        localStorage.setItem('tasks', JSON.stringify(tasks));
        localStorage.setItem('history', JSON.stringify(history));
        localStorage.setItem('todos', JSON.stringify(todos));
        localStorage.setItem('routines', JSON.stringify(routines));
        renderRoutines();
        renderTasks();
        renderHistory();
        renderStats();
        renderTodos();
        setTimeout(calculateAppInfo, 500); // Recalculate code lines/words after UI update
    }

    function renderTasks() {
        const container = document.getElementById('task-list');
        container.innerHTML = tasks.map(t => {
            const stats = getTaskStats(t);
            const unit = t.type === 'time' ? 'min' : (t.type === 'seconds' ? 'sec' : 'u');
            
            const creationDate = t.createdAt || new Date(t.id).toLocaleDateString();
            const daysTracking = Math.max(1, Math.ceil((Date.now() - t.id) / (1000 * 60 * 60 * 24)));
            const dailyAvg = stats.lifetime / daysTracking;
            
            return `
            <div class="task-card ${t.current >= t.goal ? 'goal-reached' : ''}">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <strong>${t.name}</strong> 
                        <button class="btn-icon" onclick="editName(${t.id})" title="Edit Name">✏️</button>
                        <div style="font-size: 10px; opacity: 0.6; margin-top: 2px;">Created: ${creationDate}</div>
                    </div>
                    <button class="btn-stop" style="background:none; border:none; color:var(--danger)" onclick="deleteTask(${t.id})">✕</button>
                </div>
                <div class="progress-container"><div class="progress-bar" style="width: ${Math.min((t.current/t.goal)*100, 100)}%"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <span>${t.current.toFixed(1)} / ${t.goal} ${unit} <button class="btn-text" onclick="editGoal(${t.id})">[Edit Goal]</button></span>
                </div>
                <div class="stats-panel">
                    <span>💡 Recommended: <b>${stats.recGoal.toFixed(1)}</b> <span style="opacity:0.7">(Last 7 sessions average + 2%)</span></span>
                    <span>📊 Trending: <b>${stats.trendText} (${stats.avg7Sessions.toFixed(1)}/session)</b> <span style="opacity:0.7">(Current vs Last 7 Sessions Avg)</span></span>
                    <span>🏆 Best in one day: <b>${stats.bestDay.toFixed(1)}</b> <span style="opacity:0.7">(Highest total in a single day)</span></span>
                    <span>🔥 Best session: <b>${stats.bestSession.toFixed(1)}</b> <span style="opacity:0.7">(on ${stats.bestSessionDate}) (Highest single entry)</span></span>
                    <span>🌟 Lifetime total: <b>${stats.lifetime.toFixed(1)}</b> | Daily Avg: <b>${dailyAvg.toFixed(1)}</b> <span style="opacity:0.7">(Total since creation)</span></span>
                </div>
                <div style="display:flex; gap:4px; margin-top: 5px;">
                    <input type="number" id="inc-${t.id}" class="input-mini" value="${t.type === 'time' ? '15' : (t.type === 'seconds' ? '60' : '1')}" style="width:60px">
                    <button class="btn" onclick="updateProgress(${t.id}, document.getElementById('inc-${t.id}').value)" style="flex:1">Manual Add Entry</button>
                </div>
                <div class="recent-activity">
                    <span>Yest: <b>${getHistoryForDay(t.id, t.name, 1).toFixed(1)}</b></span>
                    <span>2d ago: <b>${getHistoryForDay(t.id, t.name, 2).toFixed(1)}</b></span>
                    <span>3d ago: <b>${getHistoryForDay(t.id, t.name, 3).toFixed(1)}</b></span>
                </div>
            </div>`;
        }).join('');
    }

    function renderHistory() {
        document.getElementById('history-list').innerHTML = history.slice(0, 10).map(h => `
            <div class="history-item"><span>${h.name}: +${h.val} ${h.unit || ''} <span style="opacity:0.6; margin-left:10px;">${h.date} ${h.time}</span></span><button class="btn btn-stop" style="padding:2px" onclick="deleteSession(${h.id})">✕</button></div>
        `).join('');
    }

    function renderStats() {
        const totalGoal = tasks.reduce((acc, t) => acc + t.goal, 0);
        const totalCurrent = tasks.reduce((acc, t) => acc + t.current, 0);
        const percent = totalGoal > 0 ? Math.round((totalCurrent / totalGoal) * 100) : 0;
        document.getElementById('chart-placeholder').innerHTML = `<strong>Quantitative Goals Completion: ${percent}%</strong>`;
    }

    function deleteTask(id) { if(confirm("Delete task?")) { tasks = tasks.filter(t => t.id !== id); saveAndRender(); } }
    function clearAllData() { if(confirm("ERASE EVERYTHING?")) { localStorage.clear(); location.reload(); } }

    function exportData() {
        const blob = new Blob([JSON.stringify({tasks, history, todos, routines})], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `taskflow-backup.json`; a.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if(data.tasks) tasks = data.tasks;
                if(data.history) history = data.history;
                if(data.todos) todos = data.todos;
                if(data.routines) routines = data.routines;
                saveAndRender();
                alert("Import successful!");
            } catch(err) { alert("Invalid backup file."); }
        };
        reader.readAsText(file);
    }

    // Initialize application
    setHeaderDate();
    saveAndRender();
    setInterval(renderRoutines, 60000 * 15);
</script>
</body>
</html>
