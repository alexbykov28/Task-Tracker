<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Tracker v5.2</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --primary: #3b82f6;
            --secondary: #f3f4f6;
            --accent: #10b981;
            --border: #e5e7eb;
        }

        [data-theme="dark"] {
            --bg: #111827;
            --text: #f9fafb;
            --primary: #60a5fa;
            --secondary: #1f2937;
            --accent: #34d399;
            --border: #374151;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-bottom: 120px;
            transition: 0.3s;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .main-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        
        .sidebar {
            width: 33.33%;
            background: var(--secondary);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-sizing: border-box;
        }
        
        .main-content {
            width: 66.66%;
        }

        .grid { display: flex; flex-wrap: wrap; gap: 15px; }
        
        .task-card { 
            width: calc(50% - 8px);
            background: var(--secondary);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: 0.3s;
        }

        .task-card.goal-reached {
            border-color: var(--accent);
            background: rgba(16, 185, 129, 0.08);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
        }
        [data-theme="dark"] .task-card.goal-reached {
            background: rgba(52, 211, 153, 0.08);
        }

        @media (max-width: 800px) { 
            .main-layout { flex-direction: column; }
            .sidebar, .main-content { width: 100%; }
            .task-card { width: 100%; } 
        }

        .progress-container { background: #ddd; border-radius: 4px; height: 6px; margin: 4px 0; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; width: 0%; transition: 0.5s; }

        .recent-activity {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            opacity: 0.8;
            padding-top: 5px;
            border-top: 1px dashed var(--border);
        }

        .stats-panel {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 6px;
            margin: 2px 0;
        }

        .btn { border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; background: var(--primary); color: white; transition: 0.2s;}
        .btn:hover { opacity: 0.9; }
        .btn-stop { background: #ef4444; }
        .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-text { background: transparent; border: none; color: var(--primary); cursor: pointer; font-size: 10px; padding: 0 4px; }
        .btn-text:hover { text-decoration: underline; }
        .btn-icon { background: transparent; border: none; cursor: pointer; font-size: 14px; padding: 0 4px; opacity: 0.6; }
        .btn-icon:hover { opacity: 1; }
        
        .input-mini { padding: 6px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--secondary); padding: 15px;
            border-top: 2px solid var(--primary);
            display: flex; gap: 10px; align-items: center; justify-content: center;
            z-index: 100;
        }

        .section { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; }
        .history-item { font-size: 12px; display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid var(--border); }
        
        .timer-display { font-family: monospace; color: var(--primary); font-weight: bold; }

        .todo-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .todo-item.completed span { text-decoration: line-through; opacity: 0.5; }
        .todo-checkbox { cursor: pointer; accent-color: var(--accent); width: 16px; height: 16px; }
    </style>
</head>
<body>

<div class="header">
    <h1>TaskFlow</h1>
    <button class="btn btn-ghost" onclick="toggleTheme()">🌓 Mode</button>
</div>

<div class="main-layout">
    <div class="sidebar">
        <h3 style="margin-top: 0;">Quick To-Do List</h3>
        <div style="display:flex; gap:5px; margin-bottom: 15px;">
            <input type="text" id="todoInput" class="input-mini" style="flex:1;" placeholder="Add a quick task..." onkeypress="if(event.key === 'Enter') addTodo()">
            <button class="btn" onclick="addTodo()">Add</button>
        </div>
        <div id="todo-list"></div>
    </div>

    <div class="main-content">
        <div id="stats" style="margin-bottom: 15px;">
            <h3 style="margin-top: 0;">Today's Status</h3>
            <div id="chart-placeholder">Logging data...</div>
        </div>

        <div class="grid" id="task-list"></div>

        <div class="section">
            <h3>History & Tools</h3>
            <button class="btn btn-ghost" onclick="exportData()">📤 Export</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">📥 Import</button>
            <button class="btn btn-stop" onclick="clearAllData()">⚠️ Reset All</button>
            <div id="history-list" style="margin-top: 10px;"></div>
        </div>
    </div>
</div>

<div class="bottom-bar">
    <input type="text" id="taskNameInput" placeholder="Task Name..." class="input-mini" style="width: 120px;">
    <select id="taskTypeInput" class="input-mini" style="width: 80px;">
        <option value="time">Time (m)</option>
        <option value="seconds">Time (s)</option>
        <option value="count">Counter</option>
    </select>
    <input type="number" id="taskGoalInput" placeholder="Goal" class="input-mini" style="width: 60px;">
    <button class="btn" onclick="addTask()">+ Add Tracker</button>
</div>

<script>
    let tasks = [];
    let history = [];
    let todos = [];
    let activeTimers = {};

    try {
        tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        history = JSON.parse(localStorage.getItem('history')) || [];
        todos = JSON.parse(localStorage.getItem('todos')) || [];
    } catch (e) {
        console.error("Error loading data", e);
    }

    // Daily Reset Logic
    function checkDailyReset() {
        const today = new Date().toLocaleDateString();
        let changed = false;
        tasks.forEach(t => {
            if (t.lastUpdated !== today) {
                t.current = 0; 
                t.lastUpdated = today;
                changed = true;
            }
        });
        return changed;
    }

    function toggleTheme() {
        const doc = document.documentElement;
        doc.getAttribute('data-theme') === 'dark' ? doc.removeAttribute('data-theme') : doc.setAttribute('data-theme', 'dark');
    }

    function addTodo() {
        const input = document.getElementById('todoInput');
        if (!input.value.trim()) return;
        todos.push({ id: Date.now(), text: input.value.trim(), completed: false });
        input.value = '';
        saveAndRender();
    }

    function deleteTodo(id) {
        todos = todos.filter(t => t.id !== id);
        saveAndRender();
    }

    function toggleTodo(id) {
        const todo = todos.find(t => t.id === id);
        if (todo) todo.completed = !todo.completed;
        saveAndRender();
    }

    function renderTodos() {
        const container = document.getElementById('todo-list');
        const sortedTodos = [...todos].sort((a, b) => (a.completed === b.completed ? 0 : a.completed ? 1 : -1));
        container.innerHTML = sortedTodos.map(t => `
            <div class="todo-item ${t.completed ? 'completed' : ''}">
                <label style="display: flex; gap: 10px; align-items: center; cursor: pointer; flex: 1;">
                    <input type="checkbox" class="todo-checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTodo(${t.id})">
                    <span>${t.text}</span>
                </label>
                <button class="btn-stop" style="background:none; border:none; cursor:pointer; color:#ef4444; padding: 0 5px;" onclick="deleteTodo(${t.id})">✕</button>
            </div>
        `).join('');
    }

    function addTask() {
        const name = document.getElementById('taskNameInput').value;
        const type = document.getElementById('taskTypeInput').value;
        const goal = document.getElementById('taskGoalInput').value;
        if(!name || !goal) return alert("Fill all fields");
        
        tasks.push({ 
            id: Date.now(), 
            name, 
            type, 
            goal: parseInt(goal), 
            current: 0, 
            lastUpdated: new Date().toLocaleDateString() 
        });
        
        document.getElementById('taskNameInput').value = '';
        saveAndRender();
    }

    function editName(id) {
        const task = tasks.find(t => t.id === id);
        if(!task) return;
        const newName = prompt(`Enter new name for task:`, task.name);
        if(newName && newName.trim() !== "") {
            task.name = newName.trim();
            saveAndRender();
        }
    }

    function editGoal(id) {
        const task = tasks.find(t => t.id === id);
        if(!task) return;
        const newGoal = prompt(`Enter new goal for ${task.name}:`, task.goal);
        if(newGoal !== null && !isNaN(newGoal) && newGoal > 0) {
            task.goal = parseFloat(newGoal);
            saveAndRender();
        }
    }

    function updateProgress(id, value) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;
        const val = parseFloat(value);
        if(isNaN(val) || val <= 0) return;
        
        task.current += val;
        logHistory(task.id, task.name, val, task.type === 'time' ? 'mins' : (task.type === 'seconds' ? 'secs' : 'units'));
        saveAndRender();
    }

    function logHistory(taskId, name, val, unit) {
        history.unshift({
            id: Date.now(),
            taskId,
            name,
            val,
            unit,
            date: new Date().toLocaleDateString(),
            time: new Date().toLocaleTimeString()
        });
    }

    function deleteSession(histId) {
        const item = history.find(h => h.id === histId);
        if (item) {
            const task = tasks.find(t => t.id === item.taskId || t.name === item.name);
            const today = new Date().toLocaleDateString();
            if (task && item.date === today) {
                task.current = Math.max(0, task.current - item.val);
            }
            history = history.filter(h => h.id !== histId);
            saveAndRender();
        }
    }

    function getTaskStats(task) {
        const taskHistory = history.filter(h => h.taskId === task.id || h.name === task.name);
        let lifetime = 0, bestSession = 0, dailyTotals = {};
        
        taskHistory.forEach(h => {
            const val = parseFloat(h.val);
            lifetime += val;
            if (val > bestSession) bestSession = val;
            dailyTotals[h.date] = (dailyTotals[h.date] || 0) + val;
        });

        let bestDay = 0;
        for (const date in dailyTotals) if (dailyTotals[date] > bestDay) bestDay = dailyTotals[date];

        const todayStr = new Date().toLocaleDateString();
        const todayTotal = dailyTotals[todayStr] || 0;
        const uniqueDays = Object.keys(dailyTotals).length;
        const avg = uniqueDays > 0 ? (lifetime / uniqueDays) : 0;
        const trend = uniqueDays > 0 ? (todayTotal > avg + 0.1 ? '📈' : todayTotal < avg - 0.1 ? '📉' : '➖') : '➖';

        let last7DaysTotal = 0;
        const now = new Date();
        for (let i = 0; i < 7; i++) {
            const d = new Date(now); d.setDate(d.getDate() - i);
            last7DaysTotal += (dailyTotals[d.toLocaleDateString()] || 0);
        }
        const avg7 = last7DaysTotal / 7;
        const recGoal = avg7 * 1.05;

        return { lifetime, bestSession, bestDay, trend, avg, recGoal, avg7 };
    }

    function getHistoryForDay(taskId, taskName, daysAgo) {
        const d = new Date(); d.setDate(d.getDate() - daysAgo);
        const ds = d.toLocaleDateString();
        return history
            .filter(h => (h.taskId === taskId || h.name === taskName) && h.date === ds)
            .reduce((s, h) => s + parseFloat(h.val), 0);
    }

    function startCountdown(id, amount, isSeconds = false) {
        if(activeTimers[id]) clearInterval(activeTimers[id].interval);
        
        const ms = isSeconds ? (amount * 1000) : (amount * 60000);
        
        activeTimers[id] = {
            type: 'countdown',
            endTime: Date.now() + ms,
            amount: amount,
            interval: setInterval(() => {
                const remaining = activeTimers[id].endTime - Date.now();
                if(remaining <= 0) {
                    clearInterval(activeTimers[id].interval);
                    updateProgress(id, activeTimers[id].amount);
                    delete activeTimers[id];
                    renderTasks();
                } else {
                    const m = Math.floor(remaining / 60000), s = Math.floor((remaining % 60000) / 1000);
                    const el = document.getElementById(`timer-${id}`);
                    if(el) el.innerText = `${m}:${s.toString().padStart(2, '0')}`;
                }
            }, 1000)
        };
        renderTasks();
    }

    function saveAndRender() {
        checkDailyReset();
        localStorage.setItem('tasks', JSON.stringify(tasks));
        localStorage.setItem('history', JSON.stringify(history));
        localStorage.setItem('todos', JSON.stringify(todos));
        renderTasks();
        renderHistory();
        renderStats();
        renderTodos();
    }

    function renderTasks() {
        const container = document.getElementById('task-list');
        container.innerHTML = tasks.map(t => {
            const stats = getTaskStats(t);
            const unit = t.type === 'time' ? 'min' : (t.type === 'seconds' ? 'sec' : 'u');
            
            const hist1 = getHistoryForDay(t.id, t.name, 1).toFixed(1);
            const hist2 = getHistoryForDay(t.id, t.name, 2).toFixed(1);
            const hist3 = getHistoryForDay(t.id, t.name, 3).toFixed(1);

            return `
            <div class="task-card ${t.current >= t.goal ? 'goal-reached' : ''}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <strong>${t.name}</strong> 
                        <button class="btn-icon" onclick="editName(${t.id})" title="Edit Name">✏️</button>
                    </div>
                    <button class="btn-stop" style="background:none; border:none; color:#ef4444" onclick="deleteTask(${t.id})">✕</button>
                </div>
                
                <div class="progress-container">
                    <div class="progress-bar" style="width: ${Math.min((t.current/t.goal)*100, 100)}%"></div>
                </div>
                
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <span>${t.current.toFixed(1)} / ${t.goal} ${unit} <button class="btn-text" onclick="editGoal(${t.id})">[Edit Goal]</button></span>
                    ${activeTimers[t.id] ? `<span class="timer-display" id="timer-${t.id}">00:00</span>` : ''}
                </div>
                
                <div class="stats-panel">
                    <span title="7-Day Avg + 5%">💡 Rec: <b>${stats.recGoal.toFixed(1)}</b></span>
                    <span title="7-Day Average: ${stats.avg7.toFixed(1)}">📊 Trend: <b>${stats.trend} (${stats.avg7.toFixed(1)}/d)</b></span>
                    <span title="Best Single Day Record">🏆 Day: <b>${stats.bestDay.toFixed(1)}</b></span>
                    <span title="Best Session Record">🔥 Sess: <b>${stats.bestSession.toFixed(1)}</b></span>
                    <span title="Lifetime Total">🌟 Life: <b>${stats.lifetime.toFixed(1)}</b></span>
                </div>
                
                <div style="display:flex; gap:4px;">
                    <input type="number" id="inc-${t.id}" class="input-mini" value="${t.type === 'time' ? '15' : (t.type === 'seconds' ? '60' : '1')}" style="width:50px">
                    <button class="btn" onclick="updateProgress(${t.id}, document.getElementById('inc-${t.id}').value)" style="flex:1">Add</button>
                    
                    ${t.type === 'time' ? `
                        <button class="btn btn-ghost" onclick="startCountdown(${t.id}, 5)">5m</button>
                        <button class="btn btn-ghost" onclick="startCountdown(${t.id}, 10)">10m</button>
                        <button class="btn btn-ghost" onclick="startCountdown(${t.id}, 15)">15m</button>
                    ` : ''}

                    ${t.type === 'seconds' ? `
                        <button class="btn btn-ghost" onclick="startCountdown(${t.id}, 30, true)">30s</button>
                        <button class="btn btn-ghost" onclick="startCountdown(${t.id}, 60, true)">60s</button>
                    ` : ''}

                    ${t.type === 'count' ? `
                        <button class="btn btn-ghost" onclick="updateProgress(${t.id}, ${stats.recGoal.toFixed(1)})" title="Add Recommended">+Rec (${stats.recGoal.toFixed(1)})</button>
                        <button class="btn btn-ghost" onclick="updateProgress(${t.id}, ${stats.bestSession.toFixed(1)})" title="Add Best Session">+Best (${stats.bestSession.toFixed(1)})</button>
                    ` : ''}
                </div>

                <div class="recent-activity">
                    <span>Yesterday: <b>${hist1}</b></span>
                    <span>2d ago: <b>${hist2}</b></span>
                    <span>3d ago: <b>${hist3}</b></span>
                </div>
            </div>`;
        }).join('');
    }

    function renderHistory() {
        document.getElementById('history-list').innerHTML = history.slice(0, 5).map(h => `
            <div class="history-item"><span>${h.name}: +${h.val} ${h.unit || ''}</span><button class="btn btn-stop" style="padding:2px" onclick="deleteSession(${h.id})">✕</button></div>
        `).join('');
    }

    function renderStats() {
        const totalGoal = tasks.reduce((acc, t) => acc + t.goal, 0);
        const totalCurrent = tasks.reduce((acc, t) => acc + t.current, 0);
        const percent = totalGoal > 0 ? Math.round((totalCurrent / totalGoal) * 100) : 0;
        document.getElementById('chart-placeholder').innerHTML = `<strong>Completion: ${percent}%</strong>`;
    }

    function deleteTask(id) { if(confirm("Delete task?")) { tasks = tasks.filter(t => t.id !== id); saveAndRender(); } }
    
    function clearAllData() { if(confirm("ERASE EVERYTHING?")) { localStorage.clear(); location.reload(); } }

    function exportData() {
        const blob = new Blob([JSON.stringify({tasks, history, todos})], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup.json`; a.click();
    }

    // Initialize application
    saveAndRender();
</script>
</body>
</html>
